name: Build & Release

on:
  push:
    branches: [main, dev]
    paths:
      - '.github/workflows/build.yml'
      - 'requirements.txt'
      - 'build_nuitka.py'
      - 'bilibili.py'
      - 'bilibili_gui.py'
      - 'bilibili_drops_miner/**'
      - 'img/app.ico'
  workflow_dispatch:
    inputs:
      release:
        description: '发布到 Release'
        required: true
        type: boolean
        default: false
      tag:
        description: 'Release 版本号 (如 v1.0.0)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      update_channel: ${{ steps.version.outputs.update_channel }}
    steps:
      - name: Determine build version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.release }}" = "true" ]; then
            if [ -n "${{ github.event.inputs.tag }}" ]; then
              version="${{ github.event.inputs.tag }}"
            else
              version="v$(date +%Y%m%d.%H%M%S)"
            fi
            update_channel="release"
          else
            version="dev-${GITHUB_SHA::7}"
            update_channel="dev"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "update_channel=$update_channel" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: gui
            package: bilibili-drops-miner-gui
          - target: cli
            package: bilibili-drops-miner-cli
    steps:
      - uses: actions/checkout@v4

      - name: Generate version file
        shell: pwsh
        run: |
          @"
          APP_VERSION = "${{ needs.prepare.outputs.version }}"
          UPDATE_CHANNEL = "${{ needs.prepare.outputs.update_channel }}"
          REPOSITORY_URL = "https://github.com/mi0e/BiliBiliDropsMiner"
          LATEST_RELEASE_API = "https://api.github.com/repos/mi0e/BiliBiliDropsMiner/releases/latest"
          RELEASES_URL = "https://github.com/mi0e/BiliBiliDropsMiner/releases/latest"
          "@ | Set-Content -Path "bilibili_drops_miner/_version.py" -Encoding UTF8

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Nuitka and compiler output
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Nuitka
            ~\AppData\Local\ccache
            dist-nuitka\*.build
          key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-nuitka-${{ matrix.target }}-${{ needs.prepare.outputs.version }}-${{ hashFiles('requirements.txt', 'build_nuitka.py', 'bilibili.py', 'bilibili_gui.py', 'bilibili_drops_miner/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-nuitka-${{ matrix.target }}-
            ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-nuitka-

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          python -m pip install --disable-pip-version-check nuitka ordered-set zstandard

      - name: Build EXE with Nuitka
        run: python build_nuitka.py --target ${{ matrix.target }}

      - name: Package ZIP file
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "dist-nuitka/${{ matrix.package }}" -DestinationPath "dist/${{ matrix.package }}.zip" -CompressionLevel Fastest -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: dist/${{ matrix.package }}.zip
          retention-days: 30

  release:
    needs: [prepare, build]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/download-artifact@v4
        with:
          pattern: bilibili-drops-miner-*
          path: dist/
          merge-multiple: true
  
      - name: Rename release files
        run: |
          mv dist/bilibili-drops-miner-gui.zip dist/bilibili-drops-miner-gui-${{ needs.prepare.outputs.version }}.zip
          mv dist/bilibili-drops-miner-cli.zip dist/bilibili-drops-miner-cli-${{ needs.prepare.outputs.version }}.zip
  
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            dist/bilibili-drops-miner-gui-${{ needs.prepare.outputs.version }}.zip
            dist/bilibili-drops-miner-cli-${{ needs.prepare.outputs.version }}.zip
